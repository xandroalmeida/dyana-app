name: Deploy Web

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: read

concurrency:
  group: firebase-hosting-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy Firebase Hosting
    runs-on: ubuntu-latest
    if: ${{ github.ref_type == 'tag' }}

    steps:
      - name: Validate release tag
        run: |
          if [[ ! "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Tag must match vA.B.C, for example v1.2.3"
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: app
        run: flutter pub get

      - name: Test
        working-directory: app
        run: flutter test

      - name: Analyze
        working-directory: app
        run: flutter analyze

      - name: Build web
        working-directory: app
        run: flutter build web --release --dart-define=APP_VERSION=${GITHUB_REF_NAME}

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_DAYANA_716B3 }}
          projectId: dayana-716b3
          channelId: live
